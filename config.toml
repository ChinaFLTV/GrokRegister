# =============================================================================
# Grok / xAI 自动注册配置文件
# 修改后无需改代码，直接运行：python register.py
# =============================================================================

# -----------------------------------------------------------------------------
# [email] 注册用邮箱生成规则
# -----------------------------------------------------------------------------
[email]
# Cloudflare Email Routing 上绑定/验证过的收信域名（@ 后面的部分）
# 最终注册地址形如：随机本地部分@该域名，邮件经 CF 转发到下方 duckmail
domain = "fltv.asia"
# 邮箱本地部分（@ 前面）随机字符长度；字符集为大小写字母 + 数字
local_part_length = 8

# -----------------------------------------------------------------------------
# [duckmail] 临时邮箱 / 收信 API（用于拉取 xAI 验证码邮件）
# -----------------------------------------------------------------------------
[duckmail]
# 登录 duckmail 的邮箱账号（POST /token 请求体 address）
address = "codaily@duckmail.sbs"
# 登录 duckmail 的密码（POST /token 请求体 password）
password = "7758521"
# duckmail API 基础地址（后面会拼 ?endpoint=...）
base_url = "https://www.duckmail.sbs/api/mail"
# 获取认证 token 的 endpoint 路径（POST）
token_endpoint = "/token"
# 拉取邮件列表的 endpoint 路径（GET，需 Bearer token）
messages_endpoint = "/messages"
# 只认此发件人地址的验证码邮件（一般是 noreply@x.ai）
from_address = "noreply@x.ai"
# 邮件主题中必须包含的关键字（用于识别 xAI 验证码邮件）
subject_marker = "xAI confirmation code"

# -----------------------------------------------------------------------------
# [timing] 时间相关参数（秒 / 毫秒）
# -----------------------------------------------------------------------------
[timing]
# 轮询收件箱的间隔（秒）。越小越灵敏，过大可能漏等；建议 1～3
poll_interval_sec = 2
# 轮询收件箱的最长等待时间（秒）。超时未收到验证码则本轮失败
poll_timeout_sec = 120
# Playwright 页面操作默认超时（毫秒）。元素长时间未出现则报错
timeout_ms = 45000
# 点击按钮的单次超时（毫秒）
click_timeout_ms = 5000
# 填写输入框等待可见的超时（毫秒）
fill_timeout_ms = 12000
# 提交注册邮箱后、进入验证页前的短等待（毫秒）
after_email_submit_ms = 500
# OTP 验证码填入完成后、点击「确认邮箱」前的短等待（毫秒）
after_otp_filled_ms = 150
# 点击「确认邮箱」后、等待跳转完成注册页的短等待（毫秒）
after_otp_submit_ms = 400
# 点击「完成注册」后的收尾等待（毫秒），便于页面提交完成（含 CF 校验时可略长）
after_complete_ms = 500
# 轮询 SSO Cookie 的间隔（毫秒）；注册后自动跳转 grok.com 期间会反复检查
after_sso_capture_ms = 500
# 调用登出接口后的短等待（毫秒），便于会话清理生效
after_sign_out_ms = 300
# 登出导航超时（毫秒）。勿设过大，避免 grok.com 卡住白等 45s
sign_out_timeout_ms = 15000
# 两轮注册之间额外等待（毫秒）。复用浏览器时给上一跳转收尾，降低 goto 被 abort 概率
between_rounds_ms = 800
# OTP 逐字键入的间隔（毫秒）。过小可能导致 input-otp 未同步
otp_key_delay_ms = 30
# 打开注册页失败（如 net::ERR_ABORTED）时的最大重试次数
goto_retries = 3

# -----------------------------------------------------------------------------
# [signup] 浏览器与注册页
# -----------------------------------------------------------------------------
[signup]
# xAI 注册页 URL
url = "https://accounts.x.ai/sign-up"
# 注册成功后站点通常会自动跳到 grok.com；此 URL 仅作标识/兼容，采集 SSO 时不再主动 goto
grok_home_url = "https://grok.com"
# 每轮注册成功后的登出地址（页面 GET 导航）。用于清除本轮登录态
sign_out_url = "https://grok.com/sign-out"
# 是否在每轮成功后执行登出。false=不登出（复用浏览器时可能已登录）
sign_out_enabled = true
# 登出后是否清理 sso/session 等登录 Cookie（会保留 cf_clearance 等风控 cookie）
clear_auth_cookies = true
# 是否无头模式。false=弹出可见浏览器（便于过 Cloudflare）；true=后台运行
headless = false
# 浏览器通道：chrome=本机 Google Chrome；也可填 msedge / chromium 或留空用 Playwright 自带
browser_channel = "chrome"
# 自动化专用 Chrome 用户数据目录（持久化 cookie，利于复用 Cloudflare 通行状态）
# 注意：不要填正在使用的日常 Chrome 主配置目录
# 当 [run].workers > 1 时，会自动使用 本目录/w0、w1… 作为各并发独立 Profile
user_data_dir = "chrome-profile"

# -----------------------------------------------------------------------------
# [run] 批量注册与并发
# -----------------------------------------------------------------------------
[run]
# 本次要注册的账号总数（循环次数）。命令行 -n/--total 可覆盖
total = 5
# 并发 worker 数量。1=串行；>1 时多浏览器并行（每 worker 独立 Profile）
# 命令行 -w/--workers 可覆盖。并发时建议先对各 Profile 做 --warm-profile
workers = 1

# -----------------------------------------------------------------------------
# [output] 结果输出
# -----------------------------------------------------------------------------
[output]
# 输出产物类型：
#   cpa — 默认；拿到 SSO 后走 Device Flow 换 OAuth 凭证，写出 cliproxyapi 扁平 JSON
#   csv — 追加写入账号 CSV
type = "cpa"

# csv 模式：账号 CSV 路径（追加写入，不覆盖历史）
# 列：邮箱账号、密码、SSO、姓、名
# csv_path = "accounts.csv"

# cpa 模式：输出目录。每个账号一个文件：grok-{邮箱}.json
# 留空时自动使用当前工作目录下 {yyyyMMdd-HHmm}-{序号}/（序号从 1 递增，跳过已存在目录）
path = ""
